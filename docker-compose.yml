services:
  kompozi-caddy:
    image: caddy:2-alpine
    container_name: kompozi-caddy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      kompozi-network:
        ipv4_address: 172.22.0.10
    depends_on:
      - kompozi-app

  kompozi-postgres:
    image: postgres:16-alpine
    container_name: kompozi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kompozi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payload} -d ${POSTGRES_DB:-kompozi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      kompozi-network:
        ipv4_address: 172.22.0.20

  kompozi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kompozi-app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URI: postgresql://${POSTGRES_USER:-payload}:${POSTGRES_PASSWORD}@kompozi-postgres:5432/${POSTGRES_DB:-kompozi}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SERVER_URL: https://kompozi.local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      kompozi-postgres:
        condition: service_healthy
    networks:
      kompozi-network:
        ipv4_address: 172.22.0.30

networks:
  kompozi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

volumes:
  pgdata:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
